<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UCF Crime – Frame-Based Video Analysis</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #ffffff;
        }

        h1 {
            margin-bottom: 10px;
        }

        .controls {
            margin-bottom: 10px;
        }

        /* 🔥 IMPORTANT: FIX PIXELATION */
        .video-container img {
            max-width: 100%;
            height: auto;

            /* DO NOT force stretch */
            width: auto;

            /* Prevent browser pixel upscaling */
            image-rendering: auto;
            image-rendering: smooth;
            image-rendering: high-quality;

            /* Better edge handling */
            object-fit: contain;

            border: 1px solid #ccc;
        }
    </style>
</head>

<body>

    <h1>UCF Crime – Frame-Based Video Analysis</h1>

    <div class="controls">
        <form method="POST">
            <select name="sequence">
                {% for s in sequences %}
                    <option value="{{ s }}"
                        {% if s == selected %}selected{% endif %}>
                        {{ s }}
                    </option>
                {% endfor %}
            </select>

            <button type="submit">Start Analysis</button>
        </form>
    </div>

    <hr>

    <div class="video-container">
        {% if selected %}
            <img src="{{ url_for('video_feed', sequence=selected) }}">
        {% endif %}
    </div>

</body>
</html>
